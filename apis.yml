description: >-
  Regeneron Pharmaceuticals is a leading biotechnology company that invents,
  develops, and commercializes life-transforming medicines for people with
  serious diseases in eye disease, cancer, inflammation, infectious disease, and
  rare diseases. The Regeneron Genetics Center (RGC) is a wholly owned
  subsidiary that has sequenced over 3 million human exomes and pioneered the
  use of large-scale genomics to discover and validate drug targets. Regeneron
  open-sources bioinformatics tools including regenie (whole genome regression),
  CLAMMS (CNV detection), and TCRAI (T-cell receptor analysis) through its
  GitHub organizations at github.com/rgcgithub and github.com/regeneron-mpds.
